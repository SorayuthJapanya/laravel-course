services:
  app:
    build:
      context: ./
      dockerfile: ./.docker/containers/php/Dockerfile.dev
    container_name: laravel_course
    restart: unless-stopped
    ports:
      - "8888:8000"
    volumes:
      - ./:/app/:delegated
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: laravel_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: P@ssw0rd
      MYSQL_DATABASE: laravel_course
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pP@ssw0rd"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
